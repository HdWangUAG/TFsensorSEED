# MiniCrew literature index: MongoDB (full text + metadata) + Qdrant (vectors).
# These only *index* the distilled .md notes in knowledge/literature/ (the
# source-of-truth) — wipe and re-`minicrew index` any time.
#
#   cd minicrew && docker compose up -d        # start
#   docker compose down                        # stop (data persists in ./.data)
services:
  mongo:
    image: mongo:7
    container_name: minicrew-mongo
    ports:
      - "27017:27017"
    volumes:
      - ./.data/mongo:/data/db
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: minicrew-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./.data/qdrant:/qdrant/storage
    restart: unless-stopped
